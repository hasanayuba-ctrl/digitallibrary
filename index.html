const itemsRef=db.collection("collections");
async function loadItemsFromDB(){try{const s=await itemsRef.get();if(s.empty)return null;return s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){console.error(e);return null;}}
async function saveItemToDB(item){try{const{id,...data}=item;await itemsRef.doc(id).set(data,{merge:true});return true;}catch(e){console.error(e);return false;}}
async function deleteItemFromDB(id){try{await itemsRef.doc(id).delete();return true;}catch(e){console.error(e);return false;}}
async function seedDatabase(items){try{const b=db.batch();items.forEach(item=>{const{id,...data}=item;b.set(itemsRef.doc(id),data);});await b.commit();return true;}catch(e){console.error(e);return false;}}
